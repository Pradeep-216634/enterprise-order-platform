management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orderdb
    username: postgres
    password: pradeep
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
    baseline-on-migrate: false
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer	
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.pradeep.orderservice.kafka.event.OrderCreatedEvent
    listener:
      ack-mode: manual

security:
 jwt:
   secret-key: ReplaceThisWithAtLeastA256BitSeacretKeyReplaceThisWithAtLeastA256BitSecretKey
   expiration: 3600000
 logging:
   level:
     org.springframework.kafka.listener: TRACE
     org.apache.kafka.clients.consumer: TRACE